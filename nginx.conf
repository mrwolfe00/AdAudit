server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml;

    # Security headers (internal admin tool — same hardening as the other apps)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Long-cache the vendor bundle (immutable, content-addressed by filename)
    location ~* /vendor/.+\.(?:js|css)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Other static assets — short cache so updates land fast
    location ~* \.(?:css|js|svg|ico|woff2?|ttf|otf|eot)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Auto-loaded department mapping — never cache (refreshed by Update-Departments.ps1)
    location = /departments.csv {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # HTML: no aggressive caching
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    error_page 404 /index.html;
}
